<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — FOUR Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
{% load static %}
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#E8192C;--red-d:#B8001A;--bg:#080808;--s1:#0E0E0E;--s2:#141414;--border:rgba(255,255,255,.07);--t1:#F0F0F0;--t2:#A0A0A0;--t3:#585858;--font:'Jost',system-ui,sans-serif}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--font);display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 0%, rgba(232,25,44,.08) 0%, transparent 70%);pointer-events:none}
.login-wrap{width:100%;max-width:400px;padding:20px}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo img{height:52px;width:auto}
.login-box{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:36px}
.login-title{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.login-sub{font-size:.78rem;color:var(--t3);margin-bottom:28px}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.flbl{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
.finp{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--t1);font-family:var(--font);font-size:.85rem;outline:none;transition:border-color .2s;width:100%}
.finp:focus{border-color:var(--red)}
.finp::placeholder{color:var(--t3)}
.fsub{width:100%;background:var(--red);color:#fff;border:none;padding:12px;border-radius:6px;font-family:var(--font);font-size:.85rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:8px;letter-spacing:.04em}
.fsub:hover{background:var(--red-d)}
.error{background:rgba(232,25,44,.1);border:1px solid rgba(232,25,44,.25);border-radius:6px;padding:10px 14px;font-size:.78rem;color:#f87171;margin-bottom:16px}
.login-foot{text-align:center;margin-top:20px;font-size:.72rem;color:var(--t3)}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <img src="{% static 'logo/logo.png' %}" alt="FOUR Restaurant">
  </div>
  <div class="login-box">
    <div class="login-title">Admin Portal</div>
    <div class="login-sub">Sign in to manage FOUR Restaurant</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="fg">
        <label class="flbl">Username</label>
        <input type="text" name="username" class="finp" placeholder="Enter your username" autofocus required>
      </div>
      <div class="fg">
        <label class="flbl">Password</label>
        <input type="password" name="password" class="finp" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="fsub">Sign In →</button>
    </form>
  </div>
  <div class="login-foot">FOUR Restaurant · Admin Portal · Lahore</div>
</div>
</body>
</html>
